<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <pattern id="dots" x="10" y="10" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="0" cy="0" r="1.2" fill="rgba(255,255,255,0.1)"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" fill="#003014"/>
  <rect width="500" height="500" fill="url(#dots)"/>

  <!--
    Loop mark: circle center (250,250), radius 140, stroke 24
    330° arc from "2 o'clock" (285°) clockwise to "10 o'clock" (255°)
    Start (285°): x=250+140·cos285°=286, y=250+140·sin285°=115
    End   (255°): x=250+140·cos255°=214, y=250+140·sin255°=115
  -->

  <!-- Arc -->
  <path d="M 286 115 A 140 140 0 1 1 214 115"
        stroke="white" stroke-width="24" fill="none" stroke-linecap="round"/>

  <!-- Round cap at start (mirrors the arrowhead weight) -->
  <circle cx="286" cy="115" r="12" fill="white"/>

  <!--
    Arrowhead at end (255°).
    Clockwise tangent direction at 255°: (0.966, -0.259) — mostly right, slightly up.
    Tip nudged 12px along travel from arc endpoint: (214+12·0.966, 115−12·0.259) = (226, 112)
    Tail 26px back from tip:                        (226−26·0.966, 112+26·0.259) = (201, 119)
    Wings ±13px perpendicular (perp = (0.259, 0.966)):
      Wing1: (201+13·0.259, 119+13·0.966) = (204, 132)
      Wing2: (201−13·0.259, 119−13·0.966) = (198, 106)
  -->
  <polygon points="226,112 204,132 198,106" fill="white"/>

</svg>
